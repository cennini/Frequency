<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accordatore Chitarra</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background: #f0f0f0; }
        #freq { font-size: 4em; font-weight: bold; color: #2c3e50; display: block; margin: 20px 0; }
        button { padding: 15px 30px; font-size: 1.2em; cursor: pointer; background: #27ae60; color: white; border: none; border-radius: 5px; }
        #status { color: #7f8c8d; }
    </style>
</head>
<body>

    <h1>Rilevatore Frequenza</h1>
    <button id="startBtn">ATTIVA MICROFONO</button>
    
    <div>
        <span id="freq">0.0</span> Hz
    </div>
    
    <p id="status">Clicca sul pulsante per iniziare</p>

    <script>
    const startBtn = document.getElementById('startBtn');
    const freqDisplay = document.getElementById('freq');
    const statusDisplay = document.getElementById('status');

    startBtn.onclick = async () => {
        try {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            const source = audioCtx.createMediaStreamSource(stream);
            const analyser = audioCtx.createAnalyser();
            
            // Alta risoluzione per catturare bene i 110Hz della chitarra
            analyser.fftSize = 8192; 
            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Float32Array(bufferLength);
            
            source.connect(analyser);
            
            statusDisplay.innerText = "In ascolto... Suona una corda";
            startBtn.style.display = "none"; // Nasconde il tasto dopo l'avvio

            function update() {
                analyser.getFloatFrequencyData(dataArray);
                
                let maxDb = -Infinity;
                let maxIndex = -1;

                // Filtro: cerchiamo solo nel range tipico della chitarra
                for (let i = 0; i < bufferLength; i++) {
                    let freq = i * audioCtx.sampleRate / analyser.fftSize;
                    if (freq > 70 && freq < 1000) { 
                        if (dataArray[i] > maxDb) {
                            maxDb = dataArray[i];
                            maxIndex = i;
                        }
                    }
                }

                // Visualizza solo se il suono è abbastanza forte (evita rumore di fondo)
                if (maxDb > -70) {
                    const finalFreq = maxIndex * audioCtx.sampleRate / analyser.fftSize;
                    freqDisplay.innerText = finalFreq.toFixed(1);
                }
                
                requestAnimationFrame(update);
            }
            
            function update() {
    analyser.getFloatFrequencyData(dataArray);
    
    let threshold = -70; // Sensibilità: ignora i rumori sotto i -70dB
    let detectedFreq = 0;

    // Cerchiamo il PRIMO picco significativo partendo dalle frequenze basse (80Hz)
    // Invece di cercare il valore massimo assoluto (che spesso è un'armonica)
    for (let i = 0; i < bufferLength; i++) {
        let freq = i * audioCtx.sampleRate / analyser.fftSize;
        
        if (freq > 75 && freq < 1000) { 
            // Se troviamo un picco che supera la soglia e i suoi vicini
            if (dataArray[i] > threshold && dataArray[i] > dataArray[i-1] && dataArray[i] > dataArray[i+1]) {
                detectedFreq = freq;
                break; // IMPORTANTE: ci fermiamo al primo picco che troviamo!
            }
        }
    }

    if (detectedFreq > 0) {
        freqDisplay.innerText = detectedFreq.toFixed(1);
    }
    
    requestAnimationFrame(update);
}

            
        } catch (err) {
            statusDisplay.innerText = "Errore: " + err.message;
        }
    };
    </script>
</body>
</html>
